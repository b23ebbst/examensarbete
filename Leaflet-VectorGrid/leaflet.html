<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet.VectorGrid</title>

    <!-- Hämta in stylesheet från leaflets egna CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Hämta in Leaflet och tillägget VectorGrid -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid@latest/dist/Leaflet.VectorGrid.bundled.js"></script>

    <!-- Egna ändringar för CSS -->
    <style>
        html,body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    
    <div id="map"></div>

    <script>
        // Karta som centreras på Sverige
        const map = L.map('map', {
            center: [62, 15],
            zoom: 5,
            renderer: L.canvas(), // Tvinga till canvas-rendering
            minZoom: 0, // Minsta möjliga zoom, värdet hämtat från JSON-fil
            maxZoom: 14 // Maximala zoom som är möjlig, värdet hämtat från JSON-fil
        })

        const vectorLayer = L.vectorGrid.protobuf(
            "http://localhost:8080/data/v3/{z}/{x}/{y}.pbf",
            {
                vectorTileLayerStyles: {
                    water: { fill: true, fillColor: "blue", fillOpacity: 0.5 },
                    landuse: { fill: true, fillColor: "green", fillOpacity: 0.4 }
                }
            }
        );

        vectorLayer.addTo(map);
    </script>
</body>
</html>
