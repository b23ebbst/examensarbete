<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapLibre GL JS</title>

    <!-- Hämta in MapLibre GL JS och stylesheet -->
    <script src='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css' rel='stylesheet' />

    <style>
        html,body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id='map'></div>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    sweden: {
                        type: "vector",
                        tiles: ["http://localhost:8080/data/sweden/{z}/{x}/{y}.pbf"], //Länk till mina lokala plattor
                        minzoom: 0,
                        maxzoom: 14
                    }
                },
                layers: [
                    {
                        id: "water",
                        type: "fill",
                        source: "sweden",
                        "source-layer": "water",
                        paint: {
                            "fill-color": "blue"
                        }
                    },
                    {
                        id: "landuse",
                        type: "fill",
                        source: "sweden",
                        "source-layer": "landuse", 
                        paint: {
                            "fill-color": "green"
                        }
                    },
                    {
                        id: "landcover",
                        type: "fill",
                        source: "sweden",
                        "source-layer": "landcover",
                        paint: {
                            "fill-color": "green"
                        }
                    }, 
                    {
                        id: "park",
                        type: "fill",
                        source: "sweden",
                        "source-layer": "park",
                        paint: {
                            "fill-color": "green"
                        }
                    },
                    {
                        id: "roads",
                        type: "line",
                        source: "sweden",
                        "source-layer": "transportation",
                        paint: {
                            "line-color": "black",
                            "line-width": 1
                        }
                    },
                    {
                        id: "buildings",
                        type: "fill",
                        source: "sweden",
                        "source-layer": "building",
                        paint: {
                            "fill-color": "gray",
                            "fill-outline-color": "black"
                        }
                    }
                ]
            },
            center: [15, 62], // Startposition [lang, lat]
            zoom: 9 // Zoomnivå, utgångsläge
        });
    </script>
</body>
</html>
